root = "."

tmp_dir = "tmp"

[build]
# Command to build the application
# Add any build flags needed (like -race for race detection)
cmd = "cd api && go build -buildvcs=false -o ../tmp/main ./cmd"

entrypoint = "tmp/main"

include_ext = ["go", "tpl", "tmpl", "html", "env"]

# Directories to exclude from watching
# These directories will be ignored when detecting file changes
exclude_dir = [
    "tmp",
    "certs",
    "traefik",
    "docs",
    "api/bin",
    "api/db/migrations"
]

include_dir = ["api"]

# Watch the root .env explicitly since it lives outside include_dir
include_file = [".env"]

# File patterns to exclude from watching
# Useful for ignoring generated files, tests, or documentation
exclude_regex = ["_test.go"]

# Build delay after file change is detected (in milliseconds)
# Helps batch multiple rapid changes into one rebuild
delay = 1000

stop_on_error = true

# Send interrupt signal before killing process
# Allows graceful shutdown of the application
send_interrupt = false

# Delay after interrupt before force killing
kill_delay = "0s"

# Specific files to exclude from watching
exclude_file = [
    "api/go_sum",
    ".air.toml"
]

[log]
time = false

[color]
# Customize output colors for better readability in terminal
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Clean temporary directory on exit
clean_on_exit = true

[screen]
# Clear screen on rebuild for cleaner output
clear_on_rebuild = true
